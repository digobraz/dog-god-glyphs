<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOGYPT – Coming Soon</title>
  <meta name="description" content="A new era for dogs and humans is about to begin." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.55;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 70% at 50% 50%,
        transparent 30%, rgba(0,0,0,0.35) 65%, rgba(0,0,0,0.72) 100%);
    }

    .bottom-grad {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
    }

    .content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: 38vh;
      gap: 28px;
      z-index: 10;
    }

    @keyframes goldShine {
      0%   { background-position: 100% center; }
      100% { background-position: -100% center; }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(2.1rem, 6.75vw, 4.875rem);
      letter-spacing: 0.09em;
      line-height: 1.1;
      text-align: center;
      background: linear-gradient(90deg, #9A6F10 0%, #C8981A 25%, #F5D97A 50%, #C8981A 75%, #9A6F10 100%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShine 3.5s linear infinite;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      color: rgba(245, 240, 232, 0.62);
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.06em;
      text-align: center;
      max-width: 420px;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      width: 100%;
      max-width: 500px;
    }

    input[type="email"] {
      flex: 1 1 200px;
      padding: 13px 20px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(200,152,26,0.45);
      border-radius: 4px;
      color: #F5F0E8;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }

    input[type="email"]::placeholder { color: rgba(245,240,232,0.35); }

    button {
      padding: 13px 28px;
      background: transparent;
      border: 1px solid #C8981A;
      border-radius: 4px;
      color: #C8981A;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    button:hover {
      background: #C8981A;
      color: #000;
    }

    .success {
      font-family: 'Cinzel', serif;
      color: #C8981A;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .error-msg {
      font-family: 'Inter', sans-serif;
      color: rgba(245,100,100,0.8);
      font-size: 0.85rem;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/dz8lolmod/video/upload/q_auto/f_auto/v1775590313/STORY-9_ajc1mz.mp4" type="video/mp4" />
  </video>

  <div class="vignette"></div>
  <div class="bottom-grad"></div>

  <div class="content">
    <h1>IN DOG<br>WE TRUST</h1>

    <p class="subtitle">Leave your email. A new era for dogs and humans is about to begin.</p>

    <form id="emailForm">
      <input type="email" id="emailInput" placeholder="your@email.com" required />
      <button type="submit">I'M IN</button>
      <p class="error-msg" id="errorMsg" style="display:none">Something went wrong. Try again.</p>
    </form>

    <p class="success" id="successMsg" style="display:none">YOU'RE IN. WE'LL BE IN TOUCH.</p>
  </div>

  <script>
    const SCRIPT_URL = 'REPLACE_WITH_APPS_SCRIPT_URL';

    document.getElementById('emailForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.style.display = 'none';

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: new URLSearchParams({ email })
        });
        document.getElementById('emailForm').style.display = 'none';
        successMsg.style.display = 'block';
      } catch {
        errorMsg.style.display = 'block';
      }
    });
  </script>

</body>
</html>
